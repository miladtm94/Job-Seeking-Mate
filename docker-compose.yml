services:
  api:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["python", "-m", "app.workers.queue"]
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobmate
      POSTGRES_USER: jobmate
      POSTGRES_PASSWORD: jobmate
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
  frontend_node_modules:
